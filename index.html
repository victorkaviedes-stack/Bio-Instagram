<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excelência Digital VS</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: #07070d;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px 60px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(180, 140, 60, 0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
      z-index: 1;
    }

    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
      text-align: center;
    }

    .avatar-wrap {
      position: relative;
      width: 100px;
      height: 100px;
    }

    .avatar-ring {
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(
        #c9a84c 0deg,
        #f0d080 60deg,
        #a07020 120deg,
        #c9a84c 180deg,
        #f0d080 240deg,
        #a07020 300deg,
        #c9a84c 360deg
      );
      animation: spin 8s linear infinite;
      z-index: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .avatar-mask {
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      background: #07070d;
      z-index: 1;
    }

    .avatar-img {
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      object-fit: cover;
      z-index: 2;
      width: calc(100% - 8px);
      height: calc(100% - 8px);
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      overflow: hidden;
    }

    .avatar-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .profile-name {
      font-size: 22px;
      font-weight: 800;
      color: #7a7a90;
      letter-spacing: 0.5px;
      line-height: 1.2;
    }

    .profile-name span {
      color: #8a6820;
    }

    .profile-handle {
      font-size: 13px;
      font-weight: 400;
      color: #6b6b80;
      letter-spacing: 1px;
    }

    .profile-tagline {
      font-size: 13px;
      font-weight: 300;
      color: #9090a8;
      max-width: 280px;
      line-height: 1.6;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c9a84c, transparent);
      margin-bottom: 8px;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      position: relative;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0;
      text-decoration: none;
      border-radius: 50px;
      padding: 2px;
      background: linear-gradient(135deg, #5a5a5a, #b0b0b0, #6a6a6a, #c8c8c8, #5a5a5a);
      background-size: 300% 300%;
      animation: metalShift 5s ease infinite;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .link-btn:hover {
      transform: translateY(-2px) scale(1.015);
      box-shadow: 0 8px 32px rgba(201, 168, 76, 0.18);
    }

    .link-btn:active {
      transform: translateY(0) scale(0.99);
    }

    @keyframes metalShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .link-btn.gold {
      background: linear-gradient(135deg, #7a5a10, #c9a84c, #8a6820, #e0c060, #7a5a10);
      background-size: 300% 300%;
      animation: metalShift 4s ease infinite;
    }

    .link-btn.disabled {
      opacity: 0.55;
      pointer-events: none;
      cursor: default;
    }

    .link-btn.disabled:hover {
      transform: none;
      box-shadow: none;
    }

    .btn-inner {
      width: 100%;
      background: #0f0f1a;
      border-radius: 48px;
      display: flex;
      align-items: center;
      padding: 13px 20px;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }

    .btn-inner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.04) 50%, transparent 60%);
      transform: translateX(-100%);
      transition: transform 0.4s ease;
    }

    .link-btn:hover .btn-inner::after {
      transform: translateX(100%);
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 16px;
      overflow: hidden;
    }

    .btn-label {
      flex: 1;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #d8d8e8;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .btn-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #c9a84c;
      border: 1px solid #c9a84c44;
      padding: 2px 7px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .icon-whatsapp { background: #128C7E; color: #fff; }
    .icon-instagram {
      background: radial-gradient(circle at 30% 110%, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      color: #fff;
    }
    .icon-phone { background: #2c6fad; color: #fff; }
    .icon-course { background: linear-gradient(135deg, #101828, #1c2f4a); color: #5090d0; }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      color: #3a3a50;
      letter-spacing: 2px;
      text-transform: uppercase;
      align-self: flex-start;
      margin-top: 8px;
      margin-bottom: -4px;
      padding-left: 8px;
    }

    .footer {
      margin-top: 44px;
      font-size: 11px;
      color: #2a2a38;
      letter-spacing: 1px;
      text-align: center;
    }
  </style>
</head>
